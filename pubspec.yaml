name: arido
description: "ARIDO - دردشة ومكالمات فيديو مجانية"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.13.0

  # Zego Cloud for Video Calls
  zego_uikit_prebuilt_call: ^5.0.0

  # Agora RTC Engine for Free Video Calls
  agora_rtc_engine: ^6.2.0
  permission_handler: ^11.4.3

  # UI and State Management
  cupertino_icons: ^1.0.2
  provider: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
